# Fixed transform from the HandUMI workspace frame (origin = HMD pose at the
# last reset, X forward / Y left / Z up) to the robot world frame (dual-arm
# base plate). Teleop is absolute: a point in the real workspace always maps
# to the same point in the robot world, so a task scene placed at the same
# coordinates in sim and in reality stays aligned.
#
# Calibrate with handumi-calibrate-workspace (touch a known reference point
# with the gripper tip). Until calibrated, this default only lifts the
# HMD-origin workspace up to arm-base height.
workspace_to_robot:
  translation: [0.0, 0.0, 0.55]  # meters, robot-world
  yaw_deg: 0.0                   # rotation about Z (up), degrees
