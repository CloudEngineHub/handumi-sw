# PICO / XRoboToolkit tracking config.

backend: "pico"
source: "xrobotoolkit"

connection:
  service_script: "/opt/apps/roboticsservice/runService.sh"
  service_port: 63901
  adb_reverse: true

mode: "whole-body"

devices:
  left_controller: true
  right_controller: true
  headset: true
  body_tracking: true
  hand_tracking: true
  motion_trackers: true

reach_overlay:
  enabled: false
  robot: "piper"

