schema_version: 1
kind: handumi_robot_table_calibration
robot: yam
source: simulation_initial_pose_alignment
verified: false
calibration:
  frame_convention: pose7=[x,y,z,qx,qy,qz,qw], meters, xyzw quaternion
  # Both frames use +X right, +Y away from the operator, and +Z up, so no
  # rotation is required. This provisional simulation translation fits the
  # complete 2,010-frame validation trajectory inside the shared YAM workspace
  # while keeping its lowest TCP target above the mounting rail. It moves the
  # table frame; the YAM mounting rail and arm bases remain fixed at world Z=0.
  # Measure the physical installation and set verified: true before hardware use.
  robot_from_table:
    position: [0.01286, 0.16, 0.15]
    quaternion: [0.0, 0.0, 0.0, 1.0]
