# Main HandUMI recording config.

fps: 30

session:
  operator_id: "operator_001"
  task: "Teleoperation recording"
  notes: ""

dataset:
  repo_id: "local/handumi_dataset"
  root: "outputs/datasets/handumi_dataset"
  use_videos: true
  push_to_hub: false

hardware:
  cameras: "configs/cameras.yaml"
  feetech: "configs/feetech.yaml"
  tracking: "configs/tracking_pico.yaml"

recording:
  num_episodes: 10
  episode_time_s: 60.0
  start_button: "enter"
  start_threshold: 0.75
  manual_control: false
  repeat_button: "B"
  finish_button: "Y"
  video_codec: "h264"
